services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vkr}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backup:/backup
    # Loopback-only exposure so `docker build --network=host` can reach Postgres
    # during Next.js SSG. ufw blocks 5432 from outside.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vkr}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        DATABASE_URL: ${DATABASE_URL_BUILD}
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    networks: [internal]

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks: [internal]

networks:
  internal:
    name: fullstack_internal

volumes:
  pgdata:
  caddy_data:
  caddy_config:
